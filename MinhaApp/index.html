<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pessoas</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Gestor de Pessoas</h1>

    <input type="text" id="pesquisa" placeholder="Pesquisar nome, telemóvel, morada ou observações...">

    <div class="formulario">

        <input type="text" id="nome" placeholder="Nome">

        <input type="text" id="telefone" placeholder="Telemóvel">

        <input type="text" id="morada" placeholder="Morada">

        <textarea id="obs" placeholder="Observações"></textarea>

        <input type="file" id="foto" accept="image/*">

        <button onclick="guardarPessoa()">Guardar Pessoa</button>

    </div>

    <div id="lista"></div>

</div>

<script src="script.js"></script>

</body>
</html>
